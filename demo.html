<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TagStrip Scanner & Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 16px;
      padding-bottom: 100px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.8;
    }

    .section {
      padding: 20px;
      border-bottom: 1px solid #eee;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #333;
    }

    /* Scanner Section */
    #video-container {
      position: relative;
      width: 100%;
      max-width: 100%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    #video {
      width: 100%;
      height: auto;
      display: block;
    }

    #scan-guide {
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 60px;
      border: 2px solid #4CAF50;
      border-radius: 4px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    #scan-guide::before {
      content: 'Align tag here';
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      color: #4CAF50;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    .btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
    }

    .btn-primary {
      background: #4CAF50;
      color: white;
    }

    .btn-primary:hover {
      background: #45a049;
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-danger {
      background: #f44336;
      color: white;
    }

    .btn-danger:hover {
      background: #da190b;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .status.info {
      background: #e3f2fd;
      color: #1976d2;
      border: 1px solid #1976d2;
    }

    .status.success {
      background: #e8f5e9;
      color: #388e3c;
      border: 1px solid #388e3c;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #c62828;
    }

    /* Generator Section */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }

    .form-group input[type="number"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      transition: border-color 0.3s;
    }

    .form-group input[type="number"]:focus {
      outline: none;
      border-color: #4CAF50;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .radio-group input[type="radio"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .tag-output-container {
      position: relative;
      margin-top: 16px;
    }

    #generated-tag {
      background: #f5f5f5;
      padding: 20px;
      padding-right: 60px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      text-align: left;
      word-wrap: break-word;
      word-break: break-all;
      line-height: 1.8;
      border: 2px solid #ddd;
      min-height: 60px;
      overflow-wrap: break-word;
    }

    #generated-tag.has-content {
      background: white;
      border-color: #4CAF50;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s;
      display: none;
    }

    .copy-btn.show {
      display: block;
    }

    .copy-btn:hover {
      background: #45a049;
    }

    .copy-btn:active {
      transform: scale(0.95);
    }

    .copy-btn.copied {
      background: #2196F3;
    }

    .info-text {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }

    .console-output {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 16px;
    }

    .console-output .log {
      margin-bottom: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #333;
    }

    .console-output .log:last-child {
      border-bottom: none;
    }

    .console-output .log.success {
      color: #4CAF50;
    }

    .console-output .log.error {
      color: #f44336;
    }

    .console-output .log.info {
      color: #2196F3;
    }

    @media print {
      body {
        background: white;
      }
      .section:not(#generator-section) {
        display: none;
      }
      #generated-tag {
        font-size: 48px;
        padding: 40px;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📷 TagStrip Scanner & Generator</h1>
      <p>Scan DYMO LetraTag codes with your camera</p>
    </div>

    <!-- Scanner Section -->
    <div class="section" id="scanner-section">
      <h2>🔍 Scanner</h2>
      
      <div id="video-container" style="display: none;">
        <video id="video" autoplay playsinline></video>
        <div id="scan-guide"></div>
      </div>

      <div id="status-container"></div>

      <button id="start-scan-btn" class="btn btn-primary">Start Camera</button>
      <button id="stop-scan-btn" class="btn btn-danger" style="display: none;">Stop Scanning</button>

      <div class="console-output" id="console-output">
        <div class="log info">[INFO] Ready to scan. Click "Start Camera" to begin.</div>
      </div>
    </div>

    <!-- Generator Section -->
    <div class="section" id="generator-section">
      <h2>🏷️ Tag Generator</h2>
      
      <div class="form-group">
        <label for="payload-input">Payload (Box ID)</label>
        <input 
          type="number" 
          id="payload-input" 
          placeholder="Enter ID (0-1023 for short, 0-65535 for long)"
          min="0"
          value="42"
        >
        <div class="info-text">Short: 0-1023 | Long: 0-65535</div>
      </div>

      <div class="form-group">
        <label>Tag Variant</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="variant" value="short" checked>
            Short (20 bits)
          </label>
          <label>
            <input type="radio" name="variant" value="long">
            Long (28 bits)
          </label>
        </div>
      </div>

      <button id="generate-btn" class="btn btn-primary">Generate Tag</button>

      <div class="tag-output-container">
        <div id="generated-tag">Click "Generate Tag" to create a code</div>
        <button id="copy-btn" class="copy-btn" title="Copy to clipboard">📋 Copy</button>
      </div>
    </div>
  </div>

  <script type="module">
    // Import TagStrip - auto-detects production vs development mode
    // In dev mode (Vite), imports from src/ directly with HMR
    // In production, imports from dist/
    const isDev = import.meta.env?.DEV ?? false;
    
    let encode, decodeBits, SHORT_MAX_ID, LONG_MAX_ID, createScanner;
    
    if (isDev) {
      // Development mode - import from source with HMR
      const coreModule = await import('./src/index.js');
      const scannerModule = await import('./src/scanner/pipeline.js');
      ({ encode, decodeBits, SHORT_MAX_ID, LONG_MAX_ID } = coreModule);
      ({ createScanner } = scannerModule);
      console.log('🔥 Development mode - Hot Module Reloading enabled');
    } else {
      // Production mode - import from build
      const coreModule = await import('./dist/tagstrip.js');
      const scannerModule = await import('./src/scanner/pipeline.js');
      ({ encode, decodeBits, SHORT_MAX_ID, LONG_MAX_ID } = coreModule);
      ({ createScanner } = scannerModule);
      console.log('📦 Production mode');
    }

    // Console output helper
    const consoleOutput = document.getElementById('console-output');
    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const logEntry = document.createElement('div');
      logEntry.className = `log ${type}`;
      logEntry.textContent = `[${timestamp}] ${message}`;
      consoleOutput.appendChild(logEntry);
      consoleOutput.scrollTop = consoleOutput.scrollHeight;
      
      // Also log to browser console
      console.log(`[TagStrip] ${message}`);
    }

    // Scanner variables
    let scanner = null;
    let stream = null;

    const video = document.getElementById('video');
    const videoContainer = document.getElementById('video-container');
    const startBtn = document.getElementById('start-scan-btn');
    const stopBtn = document.getElementById('stop-scan-btn');
    const statusContainer = document.getElementById('status-container');

    function showStatus(message, type = 'info') {
      statusContainer.innerHTML = `<div class="status ${type}">${message}</div>`;
    }

    async function startScanner() {
      try {
        log('Requesting camera access...', 'info');

        // Debug logging
        log(`Secure context: ${window.isSecureContext}`, 'info');
        log(`Protocol: ${location.protocol}`, 'info');
        log(`navigator.mediaDevices exists: ${!!navigator.mediaDevices}`, 'info');
        if (navigator.mediaDevices) {
          log(`getUserMedia exists: ${!!navigator.mediaDevices.getUserMedia}`, 'info');
        }

        // Check if we're in a secure context (required for camera access)
        if (!window.isSecureContext) {
          throw new Error('Camera access requires HTTPS. Please access this page over HTTPS or localhost.');
        }

        // Check for MediaDevices API support (modern and legacy)
        let getUserMedia = null;
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          getUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        } else if (navigator.webkitGetUserMedia) {
          // Legacy webkit prefix for older Safari
          getUserMedia = navigator.webkitGetUserMedia.bind(navigator);
        } else if (navigator.mozGetUserMedia) {
          // Legacy Firefox prefix
          getUserMedia = navigator.mozGetUserMedia.bind(navigator);
        }

        if (!getUserMedia) {
          throw new Error('Camera not supported on this device/browser. MediaDevices API is not available.');
        }

        // Request camera stream
        stream = await getUserMedia({
          video: {
            facingMode: 'environment',
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        });

        video.srcObject = stream;
        videoContainer.style.display = 'block';
        startBtn.style.display = 'none';
        stopBtn.style.display = 'block';

        log('Camera started successfully', 'success');
        showStatus('📸 Camera active - Position tag in the green guide area', 'info');

        // Wait for video to be ready
        await new Promise(resolve => {
          video.onloadedmetadata = resolve;
        });

        // Create scanner instance
        scanner = createScanner(video, handleScanResult);
        scanner.start();

        log('Scanner started - Multi-frame voting enabled (5 frames, 60% consensus)', 'success');
        
      } catch (error) {
        log(`Camera error: ${error.message}`, 'error');
        showStatus(`❌ Camera error: ${error.message}`, 'error');
        console.error('Camera error:', error);
      }
    }

    function stopScanner() {
      if (scanner) {
        scanner.stop();
        scanner = null;
        log('Scanner stopped', 'info');
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
        log('Camera released', 'info');
      }

      video.srcObject = null;
      videoContainer.style.display = 'none';
      startBtn.style.display = 'block';
      stopBtn.style.display = 'none';
      statusContainer.innerHTML = '';
    }

    function handleScanResult(result) {
      if (result.success) {
        log(`✅ TAG DECODED!`, 'success');
        log(`  → Variant: ${result.variant}`, 'success');
        log(`  → Box ID: ${result.boxId}`, 'success');
        log(`  → Confidence: ${(result.confidence * 100).toFixed(1)}%`, 'success');
        
        showStatus(
          `✅ Decoded: ${result.variant.toUpperCase()} TAG | ID: ${result.boxId} | Confidence: ${(result.confidence * 100).toFixed(1)}%`,
          'success'
        );

        // Log to console for debugging
        console.log('Scan Result:', result);
      } else {
        // Don't spam console with every failed frame
        if (result.reason === 'NO_GUARD_FOUND') {
          // Silent - most common during scanning
        } else {
          log(`Decode attempt failed: ${result.reason}`, 'error');
        }
      }
    }

    // Event listeners for scanner
    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);

    // Generator functionality
    const payloadInput = document.getElementById('payload-input');
    const generateBtn = document.getElementById('generate-btn');
    const generatedTag = document.getElementById('generated-tag');
    const copyBtn = document.getElementById('copy-btn');

    function getSelectedVariant() {
      return document.querySelector('input[name="variant"]:checked').value;
    }

    function updateMaxPayload() {
      const variant = getSelectedVariant();
      const maxId = variant === 'short' ? SHORT_MAX_ID : LONG_MAX_ID;
      payloadInput.max = maxId;
      
      // Update info text
      const infoText = payloadInput.nextElementSibling;
      infoText.textContent = `Short: 0-${SHORT_MAX_ID} | Long: 0-${LONG_MAX_ID}`;
    }

    document.querySelectorAll('input[name="variant"]').forEach(radio => {
      radio.addEventListener('change', updateMaxPayload);
    });

    // Copy button functionality
    copyBtn.addEventListener('click', async () => {
      const tagText = generatedTag.textContent;
      
      if (tagText === 'Click "Generate Tag" to create a code' || tagText.startsWith('❌')) {
        log('No valid tag to copy', 'error');
        return;
      }

      try {
        await navigator.clipboard.writeText(tagText);
        copyBtn.textContent = '✅ Copied!';
        copyBtn.classList.add('copied');
        log('Tag copied to clipboard', 'success');
        
        setTimeout(() => {
          copyBtn.textContent = '📋 Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch (error) {
        log('Failed to copy to clipboard', 'error');
        console.error('Copy error:', error);
      }
    });

    generateBtn.addEventListener('click', () => {
      const payload = parseInt(payloadInput.value, 10);
      const variant = getSelectedVariant();
      const maxId = variant === 'short' ? SHORT_MAX_ID : LONG_MAX_ID;

      if (isNaN(payload)) {
        log('Please enter a valid number', 'error');
        generatedTag.textContent = '❌ Invalid input';
        generatedTag.className = '';
        copyBtn.classList.remove('show');
        return;
      }

      if (payload < 0 || payload > maxId) {
        log(`Payload out of range for ${variant} tag (0-${maxId})`, 'error');
        generatedTag.textContent = `❌ Out of range (0-${maxId} for ${variant})`;
        generatedTag.className = '';
        copyBtn.classList.remove('show');
        return;
      }

      try {
        const tag = encode(payload, variant);
        generatedTag.textContent = tag;
        generatedTag.className = 'has-content';
        copyBtn.classList.add('show');

        log(`Generated ${variant} tag for ID ${payload}`, 'success');
        log(`  Length: ${tag.length} characters`, 'info');

        // Verify round-trip (silent - only log if fails)
        const bits = Uint8Array.from(tag, c => c === '#' ? 1 : 0);
        const decoded = decodeBits(bits);
        
        if (!decoded.success || decoded.boxId !== payload) {
          log(`  ⚠️ Verification failed!`, 'error');
        }

        console.log('Generated tag:', { payload, variant, tag, length: tag.length, verified: decoded.success });
        
      } catch (error) {
        log(`Generation error: ${error.message}`, 'error');
        generatedTag.textContent = `❌ Error: ${error.message}`;
        generatedTag.className = '';
        copyBtn.classList.remove('show');
        console.error('Generation error:', error);
      }
    });

    // Initialize (wrapped to handle async imports)
    (async function init() {
      updateMaxPayload();
      
      // Only show welcome message
      if (isDev) {
        log('🔥 Development mode - HMR enabled', 'info');
      } else {
        log('📦 Production mode', 'info');
      }
    })();

    // Enable HMR for development
    if (import.meta.hot) {
      import.meta.hot.accept(['./src/index.js', './src/scanner/pipeline.js'], (modules) => {
        log('🔄 Code updated - reloading...', 'info');
        window.location.reload();
      });
    }
  </script>
</body>
</html>
